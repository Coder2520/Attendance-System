<script>
  const VALID_SECONDS = 3;

  function baseURL() {
    // works on GitHub Pages (keeps repo name)
    return location.href.split("/teacher.html")[0];
  }

  function updateQR() {
    const issuedAt = Math.floor(Date.now() / 1000);
    const data = `${baseURL()}/scan.html?ts=${issuedAt}`;

    const qrURL =
      "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" +
      encodeURIComponent(data);

    document.getElementById("qr").src = qrURL;
  }

  updateQR();
  setInterval(updateQR, VALID_SECONDS * 1000);
</script>
